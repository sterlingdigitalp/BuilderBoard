[[permission]]
identifier = "allow-app-commands"
description = "Allows BuilderBoard storage, account, and OAuth commands."
commands.allow = [
  "provider_list",
  "workspace_create",
  "workspace_list",
  "workspace_switch",
  "workspace_get_active",
  "pane_list",
  "pane_create",
  "pane_close",
  "pane_set_project",
  "message_list",
  "message_append",
  "message_create",
  "message_stream_update",
  "message_complete",
  "message_error",
  "stream_chat",
  "runtime_probe_ping",
  "account_create_api_key",
  "account_list",
  "account_disconnect",
  "account_get_status",
  "oauth_start",
  "oauth_cancel",
  "filesystem_set_approved_root",
  "filesystem_get_approved_root",
  "filesystem_list_directory",
  "filesystem_read_file",
  "filesystem_search_files",
  "filesystem_find_files",
  "project_list",
  "project_get_active",
  "project_create_from_folder",
  "project_switch",
]
